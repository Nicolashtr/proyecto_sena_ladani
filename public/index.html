      manifest.json proporciona metadatos usados cuando la aplicación web se instala en el

    -->

    <!--
      Observa el uso de %PUBLIC_URL% en las etiquetas de arriba.
      Será reemplazado con la URL de la carpeta `public` durante la compilación.
      Solo los archivos dentro de la carpeta `public` pueden ser referenciados desde el HTML.

      A diferencia de "/favicon.ico" o "favicon.ico", "%PUBLIC_URL%/favicon.ico"
      funcionará correctamente tanto con enrutamiento del lado del cliente como con una URL pública no raíz.
    -->
    <title>Sistema de Gestión La Dani</title>
  </head>

    <noscript>Necesitas habilitar JavaScript para ejecutar esta aplicación.</noscript>

      El paso de compilación colocará los scripts empaquetados dentro de la etiqueta <body>.

      Para comenzar el desarrollo, ejecuta `npm start` o `yarn start`.
